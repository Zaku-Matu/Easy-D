```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS・時間管理</title>
    <!-- Tailwind CSSの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React本体の読み込み -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- JSXを翻訳するBabelの読み込み -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <!-- ここにReactアプリが表示されます -->
    <div id="root"></div>

    <!-- ここからReactのコード -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- アイコン部品（Lucide-reactの代わり） ---
        const MapPin = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle>
            </svg>
        );

        const Lock = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        );

        const RotateCcw = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path>
            </svg>
        );

        const X = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const ExternalLink = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
        );

        // --- メインアプリ ---
        function App() {
            const [items, setItems] = useState([]);
            const [isLocked, setIsLocked] = useState(false);
            const [statusMsg, setStatusMsg] = useState("");
            
            const [confirmDialog, setConfirmDialog] = useState({
                isOpen: false,
                message: "",
                onConfirm: null
            });

            useEffect(() => {
                const savedData = localStorage.getItem('countAppData');
                const savedLock = localStorage.getItem('isLocked');
                if (savedData) {
                    setItems(JSON.parse(savedData));
                    setIsLocked(savedLock === 'true');
                } else {
                    const initialItems = Array.from({ length: 40 }, (_, i) => ({
                        id: i + 1,
                        arrival: null,
                        departure: null,
                        duration: null,
                        location: null,
                        mapUrl: null,
                    }));
                    setItems(initialItems);
                }
            }, []);

            const saveData = (newItems, locked = isLocked) => {
                setItems(newItems);
                localStorage.setItem('countAppData', JSON.stringify(newItems));
                localStorage.setItem('isLocked', locked);
            };

            const recordAction = (id, type) => {
                if (isLocked) return;

                const now = new Date();
                const timeString = now.toLocaleTimeString('ja-JP', { hour12: false });
                
                setItems(prevItems => {
                    const newItems = prevItems.map(item => {
                        if (item.id === id) {
                            let updatedItem = { ...item, [type]: timeString };
                            
                            const arrivalTime = type === 'arrival' ? timeString : item.arrival;
                            const departureTime = type === 'departure' ? timeString : item.departure;
                            
                            if (arrivalTime && departureTime) {
                                const [h1, m1] = arrivalTime.split(':').map(Number);
                                const [h2, m2] = departureTime.split(':').map(Number);
                                const diff = (h2 * 60 + m2) - (h1 * 60 + m1);
                                updatedItem.duration = diff >= 0 ? `${diff}分` : '時間エラー';
                            }
                            return updatedItem;
                        }
                        return item;
                    });
                    localStorage.setItem('countAppData', JSON.stringify(newItems));
                    return newItems;
                });

                if (!navigator.geolocation) {
                    showStatus("時刻のみ記録しました (GPS非対応)");
                    return;
                }

                showStatus("位置情報を取得中...");

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        const locString = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                        const mapUrl = `https://www.google.com/maps?q=${latitude},${longitude}`;

                        setItems(prevItems => {
                            const newItems = prevItems.map(item => 
                                item.id === id ? { ...item, location: locString, mapUrl: mapUrl } : item
                            );
                            localStorage.setItem('countAppData', JSON.stringify(newItems));
                            return newItems;
                        });
                        showStatus("時刻と位置情報を記録しました");
                    },
                    (err) => {
                        console.warn("GPS Error:", err);
                        showStatus("時刻のみ記録しました (GPS未取得)");
                    },
                    { timeout: 5000, maximumAge: 0 }
                );
            };

            const showStatus = (msg) => {
                setStatusMsg(msg);
                setTimeout(() => setStatusMsg(""), 3000);
            };

            const requestToggleLock = () => {
                setConfirmDialog({
                    isOpen: true,
                    message: isLocked ? '入力を再開しますか？' : '全件の入力をロックして完了しますか？',
                    onConfirm: () => {
                        setIsLocked(!isLocked);
                        localStorage.setItem('isLocked', !isLocked);
                        closeDialog();
                    }
                });
            };

            const requestResetAll = () => {
                setConfirmDialog({
                    isOpen: true,
                    message: 'すべての記録をリセットしますか？',
                    onConfirm: () => {
                        const initialItems = Array.from({ length: 40 }, (_, i) => ({
                            id: i + 1, arrival: null, departure: null, duration: null, location: null, mapUrl: null,
                        }));
                        setIsLocked(false);
                        saveData(initialItems, false);
                        closeDialog();
                    }
                });
            };

            const closeDialog = () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
            };

            return (
                <div className="min-h-screen p-4 font-sans relative">
                    <header className="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100 sticky top-0 z-10">
                        <h1 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                            <MapPin size={20} className="text-red-500" /> GPS・時間管理
                        </h1>
                        <div className="flex gap-2">
                            <button 
                                onClick={requestToggleLock} 
                                className={`p-2 rounded-lg transition-colors ${isLocked ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                                title="ロック切り替え"
                            >
                                <Lock size={20} />
                            </button>
                            <button 
                                onClick={requestResetAll} 
                                className="p-2 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 transition-colors"
                                title="リセット"
                            >
                                <RotateCcw size={20} />
                            </button>
                        </div>
                    </header>

                    {statusMsg && (
                        <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-4 py-2 rounded-full shadow-lg text-sm z-20 animate-pulse">
                            {statusMsg}
                        </div>
                    )}

                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 pb-8">
                        {items.map((item) => (
                            <div key={item.id} className={`p-3 rounded-xl border transition-all ${isLocked ? 'bg-gray-100 opacity-80' : 'bg-white shadow-sm border-gray-100 hover:shadow-md'}`}>
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-sm font-bold text-gray-500">No. {item.id}</span>
                                    <span className={`text-xs font-bold ${item.duration ? 'text-blue-600 bg-blue-50 px-2 py-1 rounded' : 'text-gray-400'}`}>
                                        滞在: {item.duration || '--分'}
                                    </span>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <button 
                                        disabled={isLocked} 
                                        onClick={() => recordAction(item.id, 'arrival')} 
                                        className={`py-2 rounded text-[11px] font-medium transition-colors ${
                                            item.arrival 
                                                ? 'bg-blue-500 text-white shadow-inner' 
                                                : 'bg-blue-50 text-blue-600 hover:bg-blue-100'
                                        } ${isLocked ? 'cursor-not-allowed opacity-60' : ''}`}
                                    >
                                        到着: {item.arrival ? item.arrival.slice(0, 5) : '--:--'}
                                    </button>
                                    <button 
                                        disabled={isLocked} 
                                        onClick={() => recordAction(item.id, 'departure')} 
                                        className={`py-2 rounded text-[11px] font-medium transition-colors ${
                                            item.departure 
                                                ? 'bg-orange-500 text-white shadow-inner' 
                                                : 'bg-orange-50 text-orange-600 hover:bg-orange-100'
                                        } ${isLocked ? 'cursor-not-allowed opacity-60' : ''}`}
                                    >
                                        出発: {item.departure ? item.departure.slice(0, 5) : '--:--'}
                                    </button>
                                </div>
                                
                                <div className="h-5 flex items-center">
                                    {item.mapUrl ? (
                                        <a 
                                            href={item.mapUrl} 
                                            target="_blank" 
                                            rel="noopener noreferrer" 
                                            className="text-[10px] text-blue-500 hover:text-blue-700 truncate flex items-center gap-1 hover:underline"
                                        >
                                            <ExternalLink size={10} className="text-blue-500" /> {item.location} (マップで開く)
                                        </a>
                                    ) : item.location ? (
                                        <div className="text-[10px] text-gray-500 truncate flex items-center gap-1">
                                            <MapPin size={10} className="text-gray-400" /> {item.location}
                                        </div>
                                    ) : (
                                        <div className="text-[10px] text-gray-300">位置情報未記録</div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>

                    {confirmDialog.isOpen && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden">
                                <div className="p-4 border-b border-gray-100 flex justify-between items-center">
                                    <h3 className="font-bold text-gray-800">確認</h3>
                                    <button onClick={closeDialog} className="text-gray-400 hover:text-gray-600 p-1">
                                        <X size={18} />
                                    </button>
                                </div>
                                <div className="p-6 text-gray-600 text-sm">
                                    {confirmDialog.message}
                                </div>
                                <div className="p-4 bg-gray-50 flex justify-end gap-2 border-t border-gray-100">
                                    <button 
                                        onClick={closeDialog}
                                        className="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-200 transition-colors"
                                    >
                                        キャンセル
                                    </button>
                                    <button 
                                        onClick={confirmDialog.onConfirm}
                                        className="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white hover:bg-blue-700 transition-colors shadow-sm"
                                    >
                                        はい
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Reactアプリの起動処理
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>


```
