<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS・時間管理</title>
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { overflow-x: hidden; }
        button, a, input { touch-action: manipulation; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"], input[type="time"], input[type="text"] { -moz-appearance: textfield; }
        input:focus { outline: 2px solid #3b82f6; outline-offset: -1px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- アイコン部品 ---
        const MapPin = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const Lock = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const RotateCcw = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;
        const ExternalLink = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>;
        const Download = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const Mic = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>;
        const ChevronLeft = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
        const ChevronRight = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
        const Edit2 = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>;
        const Check = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 6 9 17l-5-5"/></svg>;
        const Building = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>;
        const Coffee = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 8h1a4 4 0 1 1 0 8h-1"></path><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path><line x1="6" y1="2" x2="6" y2="4"></line><line x1="10" y1="2" x2="10" y2="4"></line><line x1="14" y1="2" x2="14" y2="4"></line></svg>;

        function App() {
            // ★改良：どんなにデータが壊れていても絶対に確実に起動させるための強靭な初期化処理
            const [items, setItems] = useState(() => {
                const initialItems = Array.from({ length: 40 }, (_, i) => ({
                    id: i + 1, arrival: null, departure: null, duration: null,
                    del: "", pic: "", memo: "", location: null, mapUrl: null,
                    product: { green: false, blue: false, gray: false },
                    facilityGroupId: null,
                    pauseStart: null 
                }));

                try {
                    const savedData = localStorage.getItem('countAppData');
                    if (savedData) {
                        const parsed = JSON.parse(savedData);
                        return parsed.map((item, index) => {
                            const init = initialItems[index] || {};
                            return {
                                ...init,
                                ...item,
                                product: item.product || { green: false, blue: false, gray: false },
                                facilityGroupId: item.facilityGroupId || null,
                                // 強制的に安全な文字列に変換してバグを防ぐ
                                pauseStart: (!item.pauseStart || item.pauseStart === "undefined") ? null : String(item.pauseStart),
                                arrival: item.arrival ? String(item.arrival).substring(0, 5) : null,
                                departure: item.departure ? String(item.departure).substring(0, 5) : null
                            };
                        });
                    }
                } catch(e) {
                    console.error("データの修復に失敗しました。初期化して起動します", e);
                }
                return initialItems;
            });

            const [baseInfo, setBaseInfo] = useState(() => {
                try {
                    const saved = localStorage.getItem('appBaseInfo');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        return {
                            targetCount: parseInt(parsed.targetCount) || 10,
                            departure: parsed.departure || null,
                            returnTime: parsed.returnTime || null,
                            isConfirmed: !!parsed.isConfirmed
                        };
                    }
                } catch(e) {
                    console.error("拠点情報の読み込みエラー", e);
                }
                return { targetCount: 10, departure: null, returnTime: null, isConfirmed: false };
            });

            const [showBase, setShowBase] = useState(() => localStorage.getItem('appShowBase') !== 'false');
            const [isLocked, setIsLocked] = useState(() => localStorage.getItem('isLocked') === 'true');
            const [currentIndex, setCurrentIndex] = useState(() => parseInt(localStorage.getItem('appCurrentIndex') || '0', 10));
            const [facilityGroupId, setFacilityGroupId] = useState(() => {
                const saved = localStorage.getItem('appFacilityGroupId');
                return (saved && saved !== 'null') ? parseInt(saved, 10) : null;
            });

            const [statusMsg, setStatusMsg] = useState("");
            const [recordingId, setRecordingId] = useState(null);
            const [editModeId, setEditModeId] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: "", onConfirm: null });

            const getTimeString = () => {
                const now = new Date();
                return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            };

            // --- 拠点情報・画面切り替えの処理 ---
            const updateBaseInfo = (field, value) => {
                setBaseInfo(prev => {
                    const next = { ...prev, [field]: value };
                    localStorage.setItem('appBaseInfo', JSON.stringify(next));
                    return next;
                });
            };

            const recordBaseTime = (field) => {
                const timeString = getTimeString();
                updateBaseInfo(field, timeString);
                showStatus(field === 'departure' ? "拠点出発を記録しました" : "帰社時間を記録しました");
            };

            const goToTopPage = () => {
                setShowBase(true);
                localStorage.setItem('appShowBase', 'true');
                window.scrollTo(0, 0);
            };

            const startWork = () => {
                if (!baseInfo.isConfirmed) {
                    showStatus("予定件数を確定してください");
                    return;
                }
                setShowBase(false);
                localStorage.setItem('appShowBase', 'false');
                window.scrollTo(0, 0);
            };

            // --- 休憩ロック機能の処理 ---
            const togglePause = (id) => {
                const timeString = getTimeString();
                setItems(prev => {
                    const newItems = prev.map(item => {
                        if (item.id === id) {
                            if (item.pauseStart) {
                                const pauseMemo = `[休憩 ${item.pauseStart}-${timeString}]`;
                                const newMemo = item.memo ? `${item.memo} ${pauseMemo}` : pauseMemo;
                                showStatus("休憩終了！メモに追記しました");
                                return { ...item, pauseStart: null, memo: newMemo };
                            } else {
                                showStatus("休憩中…画面をロックしました");
                                return { ...item, pauseStart: timeString };
                            }
                        }
                        return item;
                    });
                    localStorage.setItem('countAppData', JSON.stringify(newItems));
                    return newItems;
                });
            };

            // --- 既存の処理 ---
            const handleTextChange = (id, field, value) => {
                if (field === 'memo') { value = value.replace(/[^\x20-\x7E]/g, ''); }
                setItems(prev => {
                    const newItems = prev.map(item => item.id === id ? { ...item, [field]: value } : item);
                    localStorage.setItem('countAppData', JSON.stringify(newItems));
                    return newItems;
                });
            };

            const handleTimeChange = (id, field, value) => {
                setItems(prev => {
                    const targetItem = prev.find(i => i.id === id);
                    const groupId = targetItem ? targetItem.facilityGroupId : null;
                    const newItems = prev.map(item => {
                        if (item.id === id || (groupId && item.facilityGroupId === groupId)) {
                            let updatedItem = { ...item };
                            if (field === 'arrival' || field === 'departure') { updatedItem[field] = value; }
                            
                            if (updatedItem.arrival && updatedItem.departure) {
                                const h1 = parseInt(updatedItem.arrival.split(':')[0], 10) || 0;
                                const m1 = parseInt(updatedItem.arrival.split(':')[1], 10) || 0;
                                const h2 = parseInt(updatedItem.departure.split(':')[0], 10) || 0;
                                const m2 = parseInt(updatedItem.departure.split(':')[1], 10) || 0;
                                const diff = (h2 * 60 + m2) - (h1 * 60 + m1);
                                updatedItem.duration = diff >= 0 ? `${diff}分` : 'エラー';
                            } else { updatedItem.duration = null; }
                            return updatedItem;
                        }
                        return item;
                    });
                    localStorage.setItem('countAppData', JSON.stringify(newItems));
                    return newItems;
                });
            };

            const toggleFacilityMode = () => {
                if (isLocked) {
                    showStatus("全体ロック中は変更できません");
                    return;
                }
                if (facilityGroupId === null) {
                    const currentItem = items[currentIndex];
                    if (!currentItem.arrival) { showStatus("先に到着時間を記録してください"); return; }
                    setFacilityGroupId(currentItem.id);
                    localStorage.setItem('appFacilityGroupId', currentItem.id);
                    setItems(prev => {
                        const newItems = prev.map(item => item.id === currentItem.id ? { ...item, facilityGroupId: currentItem.id } : item);
                        localStorage.setItem('countAppData', JSON.stringify(newItems));
                        return newItems;
                    });
                    showStatus("🏢 同施設モードをONにしました");
                } else {
                    setFacilityGroupId(null);
                    localStorage.setItem('appFacilityGroupId', 'null');
                    showStatus("🏢 同施設モードをOFFにしました");
                }
            };

            const toggleProduct = (id, color) => {
                if (isLocked) return;
                setItems(prev => {
                    const newItems = prev.map(item => {
                        if (item.id === id) {
                            const prod = item.product || { green: false, blue: false, gray: false };
                            return { ...item, product: { ...prod, [color]: !prod[color] } };
                        }
                        return item;
                    });
                    localStorage.setItem('countAppData', JSON.stringify(newItems));
                    return newItems;
                });
            };

            const recordAction = (id, type) => {
                if (isLocked) return;
                const timeString = getTimeString();
                
                setItems(prevItems => {
                    const currentItem = prevItems.find(i => i.id === id);
                    const targetGroupId = currentItem ? currentItem.facilityGroupId : null;
                    const newItems = prevItems.map(item => {
                        if (item.id === id || (type === 'departure' && targetGroupId && item.facilityGroupId === targetGroupId)) {
                            let updatedItem = { ...item, [type]: timeString };
                            const arrivalTime = type === 'arrival' ? timeString : item.arrival;
                            const departureTime = type === 'departure' ? timeString : item.departure;
                            if (arrivalTime && departureTime) {
                                const h1 = parseInt(arrivalTime.split(':')[0], 10) || 0;
                                const m1 = parseInt(arrivalTime.split(':')[1], 10) || 0;
                                const h2 = parseInt(departureTime.split(':')[0], 10) || 0;
                                const m2 = parseInt(departureTime.split(':')[1], 10) || 0;
                                const diff = (h2 * 60 + m2) - (h1 * 60 + m1);
                                updatedItem.duration = diff >= 0 ? `${diff}分` : 'エラー';
                            }
                            return updatedItem;
                        }
                        return item;
                    });
                    localStorage.setItem('countAppData', JSON.stringify(newItems));
                    return newItems;
                });

                if (type === 'departure') { setTimeout(() => { const el = document.getElementById(`del-input-${id}`); if (el) el.focus(); }, 100); }
                if (!navigator.geolocation) return;
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        const locString = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                        const mapUrl = `https://www.google.com/maps?q=${latitude},${longitude}`;
                        setItems(prevItems => {
                            const newItems = prevItems.map(item => item.id === id ? { ...item, location: locString, mapUrl: mapUrl } : item);
                            localStorage.setItem('countAppData', JSON.stringify(newItems));
                            return newItems;
                        });
                    }, () => {}, { timeout: 5000, maximumAge: 0 }
                );
            };

            const startVoiceInput = (id) => {
                if (isLocked) return;
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return;
                setRecordingId(`num-${id}`);
                const recognition = new SpeechRecognition();
                recognition.lang = 'ja-JP';
                recognition.onresult = (event) => {
                    let transcript = event.results[0][0].transcript;
                    const kanjiMap = {'一':1, '二':2, '三':3, '四':4, '五':5, '六':6, '七':7, '八':8, '九':9, '〇':0};
                    transcript = transcript.replace(/[一二三四五六七八九〇]/g, match => kanjiMap[match]);
                    transcript = transcript.replace(/十/g, '10');
                    const numbers = transcript.match(/\d+/g);
                    if (numbers && numbers.length > 0) {
                        handleTextChange(id, 'del', numbers[0]);
                        handleTextChange(id, 'pic', numbers.length > 1 ? numbers[1] : "");
                        showStatus("数字を認識しました");
                    }
                    setRecordingId(null);
                };
                recognition.onerror = () => setRecordingId(null);
                recognition.onend = () => setRecordingId(null);
                try { recognition.start(); } catch(e) { setRecordingId(null); }
            };

            const startMemoVoiceInput = (id) => {
                if (isLocked) return;
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return;
                setRecordingId(`memo-${id}`);
                const recognition = new SpeechRecognition();
                recognition.lang = 'ja-JP';
                recognition.onresult = (event) => {
                    let text = event.results[0][0].transcript;
                    const alphabetMap = { 'エー':'A','ビー':'B','シー':'C','ディー':'D','イー':'E','エフ':'F','ジー':'G','エイチ':'H','アイ':'I','ジェー':'J','ケー':'K','エル':'L','エム':'M','エヌ':'N','オー':'O','ピー':'P','キュー':'Q','アール':'R','エス':'S','ティー':'T','ユー':'U','ブイ':'V','ダブリュー':'W','エックス':'X','ワイ':'Y','ゼット':'Z','ハイフン':'-', 'の':'-', 'ダッシュ':'-', 'スラッシュ':'/', 'スペース':' ' };
                    for(let key in alphabetMap) { text = text.replaceAll(key, alphabetMap[key]); }
                    const kanjiMap = {'一':1, '二':2, '三':3, '四':4, '五':5, '六':6, '七':7, '八':8, '九':9, '〇':0};
                    text = text.replace(/[一二三四五六七八九〇]/g, match => kanjiMap[match]);
                    text = text.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
                    text = text.replace(/[^\x20-\x7E]/g, '');
                    const currentItem = items.find(item => item.id === id);
                    const newMemo = currentItem.memo ? currentItem.memo + " " + text : text;
                    handleTextChange(id, 'memo', newMemo);
                    setRecordingId(null);
                };
                recognition.onerror = () => setRecordingId(null);
                recognition.onend = () => setRecordingId(null);
                try { recognition.start(); } catch(e) { setRecordingId(null); }
            };

            const showStatus = (msg) => { setStatusMsg(msg); setTimeout(() => setStatusMsg(""), 3000); };

            const exportData = () => {
                const recordedItems = items.filter(item => item.arrival || item.departure || item.del || item.pic || item.memo || (item.product && (item.product.green || item.product.blue || item.product.gray)));
                if (recordedItems.length === 0 && !baseInfo.departure && !baseInfo.returnTime) { showStatus("書き出すデータがありません"); return; }
                
                const baseHeader = `=== 拠点情報 ===\n拠点出発時間,拠点帰社時間,予定件数\n${baseInfo.departure || '--:--'},${baseInfo.returnTime || '--:--'},${baseInfo.targetCount || 0}件\n\n`;
                const itemHeader = "=== 納品データ ===\nNo,到着時間,出発時間,滞在時間,納品商品,納品数(Del),回収数(Pic),メモ,位置情報,GoogleMap URL\n";
                
                const rows = recordedItems.map(item => {
                    const safeMemo = item.memo ? `"${item.memo.replace(/"/g, '""')}"` : "";
                    const prod = item.product || {};
                    const prodArr = [];
                    if (prod.green) prodArr.push('緑');
                    if (prod.blue) prodArr.push('青');
                    if (prod.gray) prodArr.push('グレー');
                    const prodStr = prodArr.join('・');
                    return `${item.id},${item.arrival || ''},${item.departure || ''},${item.duration || ''},${prodStr},${item.del || ''},${item.pic || ''},${safeMemo},"${item.location || ''}",${item.mapUrl || ''}`;
                }).join("\n");
                
                let greenDel = 0, blueDel = 0, grayDel = 0, greenPic = 0, bluePic = 0, grayPic = 0;
                recordedItems.forEach(item => {
                    const d = parseInt(item.del, 10) || 0;
                    const p = parseInt(item.pic, 10) || 0;
                    const prod = item.product || {};
                    if (prod.green) { greenDel += d; greenPic += p; }
                    if (prod.blue)  { blueDel += d;  bluePic += p; }
                    if (prod.gray)  { grayDel += d;  grayPic += p; }
                });
                const summary = `\n\n=== 商品別集計 ===\n商品,納品数(Del)合計,回収数(Pic)合計\n緑,${greenDel},${greenPic}\n青,${blueDel},${bluePic}\nグレー,${grayDel},${grayPic}\n`;

                const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
                const blob = new Blob([bom, baseHeader + itemHeader + rows + summary], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const today = new Date();
                a.download = `GPS記録_${today.getFullYear()}${(today.getMonth()+1).toString().padStart(2,'0')}${today.getDate().toString().padStart(2,'0')}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showStatus("データを書き出しました");
            };

            const closeDialog = () => setConfirmDialog({ isOpen: false, message: "", onConfirm: null });

            // ★完全リセット機能
            const resetApp = () => {
                const initialItems = Array.from({ length: 40 }, (_, i) => ({ 
                    id: i + 1, arrival: null, departure: null, duration: null, 
                    del: "", pic: "", memo: "", location: null, mapUrl: null, 
                    product: { green: false, blue: false, gray: false }, facilityGroupId: null, pauseStart: null
                })); 
                setIsLocked(false); 
                setFacilityGroupId(null);
                setItems(initialItems);
                
                setBaseInfo({ targetCount: 10, departure: null, returnTime: null, isConfirmed: false });
                setShowBase(true);
                
                localStorage.clear(); // 古いバグデータを完全に消去！
                
                setCurrentIndex(0); 
                closeDialog();
                showStatus("すべてリセットしました");
            };

            const goToNext = () => {
                if (currentIndex < baseInfo.targetCount - 1) {
                    const next = currentIndex + 1;
                    if (facilityGroupId !== null) {
                        setItems(prevItems => {
                            const parentItem = prevItems.find(i => i.id === facilityGroupId);
                            if (!parentItem) return prevItems;
                            const newItems = prevItems.map(item => {
                                if (item.id === next + 1) {
                                    let newMemo = item.memo;
                                    if (!newMemo.includes('同施設')) { newMemo = newMemo ? `同施設 ${newMemo}` : '同施設'; }
                                    return { ...item, facilityGroupId: facilityGroupId, arrival: parentItem.arrival, memo: newMemo };
                                }
                                return item;
                            });
                            localStorage.setItem('countAppData', JSON.stringify(newItems));
                            return newItems;
                        });
                    }
                    setCurrentIndex(next);
                    localStorage.setItem('appCurrentIndex', next);
                    setEditModeId(null);
                    window.scrollTo(0, 0);
                }
            };

            const goToPrev = () => {
                if (currentIndex > 0) {
                    const prev = currentIndex - 1;
                    setCurrentIndex(prev);
                    localStorage.setItem('appCurrentIndex', prev);
                    setEditModeId(null);
                    window.scrollTo(0, 0);
                }
            };

            // ここでitemsが空になることは絶対にないが念のため
            if (!items || items.length === 0) return null;

            const item = items[currentIndex];
            // 万が一itemがundefinedの時のための安全策
            if (!item) return null;

            const isEditing = editModeId === item.id;
            const prod = item.product || { green: false, blue: false, gray: false };
            const isFacilityModeActive = facilityGroupId !== null;
            const isPaused = !!item.pauseStart; 

            return (
                <div className="min-h-screen p-2 font-sans relative max-w-lg mx-auto pb-4">
                    {/* 共通ヘッダー */}
                    <header className="flex justify-between items-center mb-2 bg-white p-3 rounded-xl shadow-sm border border-gray-200">
                        <h1 className="text-lg font-bold text-gray-800 flex items-center gap-1">
                            {showBase ? <Building size={20} className="text-indigo-600" /> : <MapPin size={20} className="text-red-500" />}
                            {showBase ? "拠点 / 全体管理" : "記録アプリ"}
                        </h1>
                        <div className="flex gap-2">
                            <button onClick={exportData} className="p-2 rounded-lg bg-gray-200 text-gray-700 hover:bg-gray-300"><Download size={20} /></button>
                            <button onClick={() => setConfirmDialog({ isOpen: true, message: isLocked ? '入力を再開しますか？' : '画面全体をロックしますか？', onConfirm: () => { setIsLocked(!isLocked); localStorage.setItem('isLocked', !isLocked); closeDialog(); }})} className={`p-2 rounded-lg ${isLocked ? 'bg-red-100 text-red-600 border border-red-300' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}><Lock size={20} /></button>
                            <button onClick={() => setConfirmDialog({ isOpen: true, message: 'すべての記録と拠点設定をリセットしますか？', onConfirm: resetApp })} className="p-2 rounded-lg bg-gray-200 text-gray-700 hover:bg-gray-300"><RotateCcw size={20} /></button>
                        </div>
                    </header>

                    {statusMsg && (
                        <div className="fixed top-16 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full shadow-lg text-sm font-bold z-20 animate-pulse text-center w-[80%] z-50">
                            {statusMsg}
                        </div>
                    )}

                    {showBase ? (
                        /* ================= トップページ ================= */
                        <div className={`bg-white p-5 rounded-2xl shadow-md border-2 border-indigo-200 flex flex-col gap-6 transition-opacity ${isLocked ? 'opacity-50 pointer-events-none' : ''}`}>
                            <div className="flex flex-col gap-2">
                                <label className="font-bold text-gray-700 text-center">本日の予定件数</label>
                                <div className="flex gap-2">
                                    <input 
                                        type="number" min="1" max="40"
                                        value={baseInfo.targetCount}
                                        onChange={(e) => updateBaseInfo('targetCount', parseInt(e.target.value) || 1)}
                                        disabled={baseInfo.isConfirmed}
                                        className="flex-1 p-3 text-center text-3xl font-extrabold text-gray-800 border-2 border-gray-300 rounded-xl outline-none bg-gray-50"
                                    />
                                    <button 
                                        onClick={() => updateBaseInfo('isConfirmed', !baseInfo.isConfirmed)}
                                        className={`px-6 rounded-xl font-bold text-lg border-2 transition-colors ${baseInfo.isConfirmed ? 'bg-gray-200 text-gray-600 border-gray-300' : 'bg-indigo-600 text-white border-indigo-700 shadow-inner'}`}
                                    >
                                        {baseInfo.isConfirmed ? '変更' : '確定'}
                                    </button>
                                </div>
                            </div>

                            <div className="border-t border-gray-200 pt-6 grid grid-cols-2 gap-4">
                                <button 
                                    onClick={() => recordBaseTime('departure')}
                                    className={`py-6 rounded-2xl text-2xl font-extrabold shadow-sm active:scale-95 transition-all border-2 
                                        ${baseInfo.departure ? 'bg-green-600 text-white border-green-700 shadow-inner' : 'bg-white text-green-600 border-green-400'}`}
                                >
                                    拠点出発<br/><span className="text-3xl">{baseInfo.departure || '--:--'}</span>
                                </button>
                                <button 
                                    onClick={() => recordBaseTime('returnTime')}
                                    className={`py-6 rounded-2xl text-2xl font-extrabold shadow-sm active:scale-95 transition-all border-2
                                        ${baseInfo.returnTime ? 'bg-blue-600 text-white border-blue-700 shadow-inner' : 'bg-white text-blue-600 border-blue-400'}`}
                                >
                                    帰社<br/><span className="text-3xl">{baseInfo.returnTime || '--:--'}</span>
                                </button>
                            </div>

                            {baseInfo.isConfirmed && (
                                <button 
                                    onClick={startWork}
                                    className="mt-2 py-5 w-full rounded-2xl text-2xl font-extrabold bg-indigo-600 text-white hover:bg-indigo-500 shadow-lg border-b-4 border-indigo-800 flex items-center justify-center gap-2 active:scale-95"
                                >
                                    {items[0] && items[0].arrival ? '作業に戻る' : '業務開始 (No.1へ)'} <ChevronRight size={28} />
                                </button>
                            )}
                        </div>
                    ) : (
                        /* ================= アイテムページ ================= */
                        <div className="flex flex-col gap-2">
                            <div className="flex flex-col gap-2 bg-white p-2 rounded-xl shadow-sm border border-gray-200">
                                <div className="flex justify-between items-center">
                                    <button onClick={() => currentIndex === 0 ? goToTopPage() : goToPrev()} className="p-2 rounded-lg text-blue-600 bg-blue-50 active:bg-blue-100">
                                        <ChevronLeft size={24} />
                                    </button>
                                    <div className="text-xl font-extrabold text-gray-800">
                                        No. {item.id} <span className="text-sm text-gray-400 font-bold">/ {baseInfo.targetCount}</span>
                                    </div>
                                    <button onClick={() => currentIndex >= baseInfo.targetCount - 1 ? goToTopPage() : goToNext()} className="p-2 rounded-lg text-blue-600 bg-blue-50 active:bg-blue-100">
                                        {currentIndex >= baseInfo.targetCount - 1 ? <Building size={24} /> : <ChevronRight size={24} />}
                                    </button>
                                </div>
                                <div className="flex justify-center border-t border-gray-100 pt-2">
                                    <button 
                                        disabled={isPaused}
                                        onClick={toggleFacilityMode}
                                        className={`px-4 py-2 w-full max-w-xs rounded-lg text-sm font-bold border-2 transition-colors flex items-center justify-center gap-2 active:scale-95
                                            ${isFacilityModeActive ? 'bg-indigo-100 text-indigo-700 border-indigo-400 shadow-inner' : 'bg-gray-50 text-gray-500 border-gray-300 shadow-sm'}
                                            ${isPaused ? 'opacity-50' : ''}`}
                                    >
                                        🏢 同施設モード：{isFacilityModeActive ? 'ON (連続中)' : 'OFF'}
                                    </button>
                                </div>
                            </div>

                            <div key={item.id} className={`p-3 rounded-2xl border-2 shadow-md transition-all ${isLocked ? 'bg-gray-100 border-gray-300' : isFacilityModeActive ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-blue-200'}`}>
                                
                                <div className="mb-4">
                                    <button 
                                        onClick={() => togglePause(item.id)}
                                        className={`w-full py-4 rounded-xl text-lg font-extrabold border-2 shadow-sm flex items-center justify-center gap-2 transition-all active:scale-95
                                            ${isPaused ? 'bg-orange-500 text-white border-orange-600 shadow-inner animate-pulse' : 'bg-white text-orange-600 border-orange-300'}
                                            ${isLocked ? 'opacity-80' : ''}`}
                                    >
                                        <Coffee size={24} />
                                        {isPaused ? `休憩を終了する (開始: ${item.pauseStart})` : '☕ 休憩を開始する'}
                                    </button>
                                </div>

                                <div className={`transition-all duration-300 ${isPaused || isLocked ? 'opacity-40 pointer-events-none grayscale' : ''}`}>
                                    
                                    <div className="flex justify-between items-center mb-3">
                                        <span className={`text-base font-bold px-3 py-1.5 rounded-lg border ${item.duration ? 'text-gray-800 bg-yellow-100 border-yellow-400' : 'text-gray-400 border-gray-200 bg-white'}`}>
                                            滞在: {item.duration || '--分'}
                                        </span>
                                        <button 
                                            onClick={() => setEditModeId(isEditing ? null : item.id)}
                                            className={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-bold border transition-colors ${isEditing ? 'bg-indigo-600 text-white border-indigo-700' : 'bg-white text-gray-700 border-gray-300'}`}
                                        >
                                            {isEditing ? <Check size={16} /> : <Edit2 size={16} />}
                                            {isEditing ? '完了' : '修正'}
                                        </button>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-2 mb-3">
                                        {isEditing ? (
                                            <div className="flex flex-col gap-1">
                                                <label className="text-xs font-bold text-gray-600 text-center">到着時間を修正</label>
                                                <input type="time" value={item.arrival || ""} onChange={(e) => handleTimeChange(item.id, 'arrival', e.target.value)} className="w-full p-2 border-2 border-gray-300 rounded-xl text-xl font-bold text-center text-gray-800 bg-white outline-none" />
                                            </div>
                                        ) : (
                                            <button 
                                                onClick={() => {
                                                    if (item.facilityGroupId && item.facilityGroupId !== item.id) {
                                                        showStatus("🏢 連動中のため到着時間は自動入力されています");
                                                    } else {
                                                        recordAction(item.id, 'arrival');
                                                    }
                                                }} 
                                                className={`py-3 rounded-xl text-lg font-extrabold shadow-sm active:scale-95 transition-all 
                                                    ${item.facilityGroupId && item.facilityGroupId !== item.id ? 'bg-gray-100 text-gray-400 border-gray-300 border-2' : 
                                                    item.arrival ? 'bg-green-600 text-white border-green-700 shadow-inner' : 'bg-white text-green-600 border-green-400 border-2'}`}
                                            >
                                                {item.facilityGroupId && item.facilityGroupId !== item.id ? (
                                                    <>到着<br/><span className="text-xl">{item.arrival || '--:--'}</span><div className="text-[10px] font-normal leading-tight mt-1">連動中</div></>
                                                ) : (
                                                    <>到着<br/><span className="text-xl">{item.arrival || '--:--'}</span></>
                                                )}
                                            </button>
                                        )}

                                        {isEditing ? (
                                            <div className="flex flex-col gap-1">
                                                <label className="text-xs font-bold text-gray-600 text-center">出発時間を修正</label>
                                                <input type="time" value={item.departure || ""} onChange={(e) => handleTimeChange(item.id, 'departure', e.target.value)} className="w-full p-2 border-2 border-gray-300 rounded-xl text-xl font-bold text-center text-gray-800 bg-white outline-none" />
                                            </div>
                                        ) : (
                                            <button 
                                                onClick={() => {
                                                    if (isFacilityModeActive) {
                                                        showStatus("🏢 出発を記録するには、同施設モードをOFFにしてください");
                                                    } else {
                                                        recordAction(item.id, 'departure');
                                                    }
                                                }} 
                                                className={`py-3 rounded-xl text-lg font-extrabold shadow-sm active:scale-95 transition-all 
                                                    ${isFacilityModeActive ? 'bg-indigo-100 text-indigo-500 border-indigo-300 border-2' : 
                                                    item.departure ? 'bg-blue-600 text-white border-blue-700 shadow-inner' : 'bg-white text-blue-600 border-blue-400 border-2'}`}
                                            >
                                                {isFacilityModeActive ? (
                                                    <div className="flex flex-col h-full justify-center text-sm px-2">モードOFFで<br/>出発を入力</div>
                                                ) : (
                                                    <>出発<br/><span className="text-xl">{item.departure || '--:--'}</span></>
                                                )}
                                            </button>
                                        )}
                                    </div>

                                    <div className="mb-3 bg-white p-2 rounded-xl border border-gray-200">
                                        <label className="block text-xs font-bold text-gray-600 mb-1.5 text-center">納品商品 (タップで選択)</label>
                                        <div className="flex gap-2">
                                            <button onClick={() => toggleProduct(item.id, 'green')} className={`flex-1 py-2.5 rounded-lg text-lg font-extrabold border-2 transition-all ${prod.green ? 'bg-green-500 text-white border-green-600 shadow-inner' : 'bg-white text-green-600 border-green-300'}`}>緑</button>
                                            <button onClick={() => toggleProduct(item.id, 'blue')} className={`flex-1 py-2.5 rounded-lg text-lg font-extrabold border-2 transition-all ${prod.blue ? 'bg-blue-500 text-white border-blue-600 shadow-inner' : 'bg-white text-blue-600 border-blue-300'}`}>青</button>
                                            <button onClick={() => toggleProduct(item.id, 'gray')} className={`flex-1 py-2.5 rounded-lg text-lg font-extrabold border-2 transition-all ${prod.gray ? 'bg-gray-500 text-white border-gray-600 shadow-inner' : 'bg-white text-gray-600 border-gray-300'}`}>グレー</button>
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-2 mb-3 bg-white p-2 rounded-xl border border-gray-200">
                                        <span className="text-sm font-bold text-gray-600 w-12 text-center leading-tight">Del/Pic</span>
                                        <div className="flex flex-1 items-center bg-white rounded-lg border border-gray-300 overflow-hidden shadow-inner h-12">
                                            <input id={`del-input-${item.id}`} type="number" value={item.del} onChange={(e) => handleTextChange(item.id, 'del', e.target.value)} className="w-full p-2 text-center text-xl font-bold text-gray-800 outline-none" placeholder="納品" />
                                            <span className="bg-gray-200 h-full w-px"></span>
                                            <input type="number" value={item.pic} onChange={(e) => handleTextChange(item.id, 'pic', e.target.value)} className="w-full p-2 text-center text-xl font-bold text-gray-800 outline-none" placeholder="回収" />
                                        </div>
                                        <button onClick={() => startVoiceInput(item.id)} disabled={recordingId === `num-${item.id}`} className={`w-12 h-12 rounded-lg flex items-center justify-center border shadow-sm ${recordingId === `num-${item.id}` ? 'bg-red-500 border-red-600 text-white animate-pulse' : 'bg-gray-100 border-gray-300 text-gray-700'}`}>
                                            <Mic size={20} />
                                        </button>
                                    </div>

                                    <div className="flex items-center gap-2 mb-2 bg-white p-2 rounded-xl border border-gray-200">
                                        <span className="text-sm font-bold text-gray-600 w-12 text-center">Memo</span>
                                        <div className="flex flex-1 bg-white rounded-lg border border-gray-300 shadow-inner h-12">
                                            <input 
                                                type="text" inputMode="email"
                                                value={item.memo} 
                                                onChange={(e) => handleTextChange(item.id, 'memo', e.target.value)} 
                                                className="w-full p-2 text-lg font-bold text-gray-800 outline-none rounded-lg" 
                                                placeholder="英数字・記号" 
                                            />
                                        </div>
                                        <button onClick={() => startMemoVoiceInput(item.id)} disabled={recordingId === `memo-${item.id}`} className={`w-12 h-12 rounded-lg flex items-center justify-center border shadow-sm ${recordingId === `memo-${item.id}` ? 'bg-red-500 border-red-600 text-white animate-pulse' : 'bg-gray-100 border-gray-300 text-gray-700'}`}>
                                            <Mic size={20} />
                                        </button>
                                    </div>
                                    
                                    <div className="h-5 flex items-center justify-end">
                                        {item.mapUrl ? (
                                            <a href={item.mapUrl} target="_blank" rel="noopener noreferrer" className="text-xs font-bold text-blue-600 truncate flex items-center gap-1 hover:underline">
                                                <ExternalLink size={12} /> マップで開く ({item.location})
                                            </a>
                                        ) : item.location ? (
                                            <div className="text-xs font-bold text-gray-500 truncate flex items-center gap-1"><MapPin size={12} /> {item.location}</div>
                                        ) : null}
                                    </div>

                                </div>
                            </div>

                            {!isPaused && (
                                currentIndex < baseInfo.targetCount - 1 ? (
                                    <button 
                                        onClick={goToNext} 
                                        disabled={isLocked}
                                        className={`mt-2 py-4 w-full rounded-xl text-xl font-bold shadow-md flex items-center justify-center gap-2 active:scale-95 ${isLocked ? 'hidden' : 'bg-indigo-600 text-white hover:bg-indigo-500'}`}
                                    >
                                        <span>✅ 完了して次へ (No. {item.id + 1})</span>
                                        <ChevronRight size={24} />
                                    </button>
                                ) : (
                                    <button 
                                        onClick={goToTopPage} 
                                        disabled={isLocked}
                                        className={`mt-2 py-4 w-full rounded-xl text-xl font-bold shadow-md flex items-center justify-center gap-2 active:scale-95 ${isLocked ? 'hidden' : 'bg-gray-800 text-white hover:bg-gray-700 border-b-4 border-gray-900'}`}
                                    >
                                        <span>🏁 完了して拠点へ戻る</span>
                                        <Building size={24} />
                                    </button>
                                )
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
